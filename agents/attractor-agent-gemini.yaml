# Gemini coding agent (gemini-cli aligned)
# Uses edit_file, includes web tools for grounding.
# Shared definition — referenced by attractor-pipeline, attractor-interactive,
# and pipeline-runner bundles.

bundle:
  name: attractor-agent-gemini
  version: 0.1.0
  description: >
    Gemini coding agent (gemini-cli aligned).
    Uses edit_file, includes web tools for grounding.

includes:
  - bundle: attractor:behaviors/attractor-core

providers:
  - module: provider-gemini
    source: git+https://github.com/microsoft/amplifier-module-provider-gemini@main
    config:
      # default_model removed: model must be set explicitly via llm_model node attribute
      # or the pipeline's model_stylesheet. No silent defaults.
      timeout: 600

session:
  orchestrator:
    module: loop-agent
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
    config:
      max_tool_rounds_per_input: 50
      default_command_timeout_ms: 10000
  context:
    module: context-simple
    source: git+https://github.com/microsoft/amplifier-module-context-simple@main

tools:
  - module: tool-filesystem
    source: git+https://github.com/microsoft/amplifier-module-tool-filesystem@main
  - module: tool-bash
    source: git+https://github.com/microsoft/amplifier-module-tool-bash@main
    config:
      timeout: 10
  - module: tool-search
    source: git+https://github.com/microsoft/amplifier-module-tool-search@main
  - module: tool-web
    source: git+https://github.com/microsoft/amplifier-module-tool-web@main

context:
  # Layer-1 base prompt (nlspec §6.1: "Provider-specific base instructions from ProviderProfile").
  # foundation registers a system-prompt factory on the context module when this include is set;
  # loop-agent's AgentOrchestrator.execute() resolves the factory before creating the session
  # so the file content becomes session_config.system_prompt (Layer 1).
  include:
    - ../context/system-gemini.md