# Interactive Attractor session with pipeline execution capability.
#
# This bundle creates an interactive coding agent that can also invoke
# DOT graph pipelines at runtime via the run_pipeline tool. Combines:
# - An interactive agent loop (loop-agent) for conversation
# - The run_pipeline tool for pipeline invocation
# - Pipeline-awareness context so the agent knows about pipelines
# - The pipeline-runner agent registered for spawning

bundle:
  name: attractor-interactive
  version: 0.1.0
  description: >
    Interactive Attractor session with pipeline execution capabilities.
    An agent that can converse normally AND invoke DOT graph pipelines
    on demand via the run_pipeline tool.

includes:
  - bundle: attractor:behaviors/attractor-core
  - bundle: git+https://github.com/microsoft/amplifier-foundation@main

# Interactive session provider
providers:
  - module: provider-anthropic
    source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
    config:
      default_model: claude-sonnet-4-6

# Interactive agent loop (not pipeline — the user talks to this)
session:
  orchestrator:
    module: loop-agent
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
    config:
      max_tool_rounds_per_input: 50
      default_command_timeout_ms: 120000
      # Layer-1 base comes from loop-agent's provider default
      # (context/system-anthropic.md). The context.include below
      # (pipeline-awareness, dot-reference) is ADDITIVE context, not the base.
  context:
    module: context-simple
    source: git+https://github.com/microsoft/amplifier-module-context-simple@main

# Tools: standard coding tools + pipeline runner
tools:
  - module: tool-filesystem
    source: git+https://github.com/microsoft/amplifier-module-tool-filesystem@main
  - module: tool-bash
    source: git+https://github.com/microsoft/amplifier-module-tool-bash@main
    config:
      timeout: 120
  - module: tool-search
    source: git+https://github.com/microsoft/amplifier-module-tool-search@main
  - module: tool-pipeline-run
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/tool-pipeline-run
    config:
      runner_agent: attractor-pipeline-runner
      profiles:
        anthropic: attractor-agent-anthropic
        openai: attractor-agent-openai
        gemini: attractor-agent-gemini

context:
  # '../context/' climbs from this YAML's dir to the bundle-root context/; idiomatic target is 'attractor:context/...' pending foundation namespaced-include support.
  include:
    - ../context/pipeline-awareness.md
    - ../context/dot-reference.md

# Agents: pipeline runner + per-provider child agents
# IMPORTANT: inline session.orchestrator is REQUIRED here.  The spawn capability merges
# the agent's session: key onto the parent config; without an explicit session.orchestrator
# the child inherits the parent's orchestrator and may recurse.
agents:
  attractor-pipeline-runner:
    description: >
      Pipeline execution agent. Spawned by the run_pipeline tool to execute
      a DOT graph pipeline. Uses loop-pipeline orchestrator with all three
      provider profiles available for model stylesheet routing.
    session:
      orchestrator:
        module: loop-pipeline
        source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-pipeline
        config:
          profiles:
            anthropic: attractor-agent-anthropic
            openai: attractor-agent-openai
            gemini: attractor-agent-gemini
  attractor-agent-anthropic:
    description: >
      Anthropic coding agent (Claude Code aligned).
      Uses edit_file with old_string/new_string, 120s shell timeout.
    session:
      orchestrator:
        module: loop-agent
        source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
        config:
          max_tool_rounds_per_input: 50
          default_command_timeout_ms: 120000
  attractor-agent-openai:
    description: >
      OpenAI coding agent (codex-rs aligned).
      Uses native apply_patch (Responses API built-in), restricted filesystem, 10s shell timeout.
    session:
      orchestrator:
        module: loop-agent
        source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
        config:
          max_tool_rounds_per_input: 50
          default_command_timeout_ms: 10000
  attractor-agent-gemini:
    description: >
      Gemini coding agent (gemini-cli aligned).
      Uses edit_file, includes web tools for grounding.
    session:
      orchestrator:
        module: loop-agent
        source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
        config:
          max_tool_rounds_per_input: 50
          default_command_timeout_ms: 10000
