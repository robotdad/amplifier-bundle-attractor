bundle:
  name: attractor-e2e-anthropic
  version: 0.1.0
  description: E2E test profile - Anthropic agent (no pipeline)

providers:
  - module: provider-anthropic
    source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
    config:
      # Pinned to a concrete id on purpose: this is an E2E test profile and must
      # be reproducible. A provider `default_model` is passed to the SDK verbatim
      # (it is NOT routed through the engine's glob/family resolver), so it must
      # always be a concrete served id. Self-healing globs (e.g. claude-sonnet-4-*)
      # work on a node's `llm_model`; reproducible evals pin a concrete id.
      default_model: claude-sonnet-4-6

session:
  orchestrator:
    module: loop-agent
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/loop-agent
    config:
      max_tool_rounds_per_input: 20
      reasoning_effort: high
  context:
    module: context-simple
    source: git+https://github.com/microsoft/amplifier-module-context-simple@main

tools:
  - module: tool-filesystem
    source: git+https://github.com/microsoft/amplifier-module-tool-filesystem@main
  - module: tool-bash
    source: git+https://github.com/microsoft/amplifier-module-tool-bash@main
    config:
      timeout: 120
  - module: tool-search
    source: git+https://github.com/microsoft/amplifier-module-tool-search@main
  - module: tool-report-outcome
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/tool-report-outcome

hooks:
  - module: hooks-tool-truncation
    source: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=modules/hooks-tool-truncation
